<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikiplot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transition for AI answer appearance */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        details > summary { list-style: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
        .spinner { border-top-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 flex space-x-8">
            <button onclick="switchTab('search')" id="tab-search" class="py-4 px-2 border-b-2 border-indigo-600 font-bold text-indigo-600">Search</button>
            <button onclick="switchTab('admin')" id="tab-admin" class="py-4 px-2 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-800">CRUD</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">

        <div id="view-search" class="block space-y-6">
            <div class="relative group">
                <input type="text" id="searchInput" 
                    class="w-full text-xl pl-6 pr-32 py-5 rounded-2xl border-2 border-gray-200 focus:border-indigo-500 focus:outline-none shadow-xl transition-all" 
                    placeholder="Ask about a plot, character, or relationship..." 
                    onkeypress="if(event.key === 'Enter') executeSearch()">
                <button onclick="executeSearch()" class="absolute right-3 top-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded-xl shadow-lg transition-all">
                    Ask AI
                </button>
            </div>

            <div id="searchLoader" class="hidden flex flex-col items-center justify-center py-20">
                <div class="spinner rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-indigo-600 font-bold animate-pulse">Consulting the archives...</p>
            </div>

            <div id="aiAnswerSection" class="hidden fade-in space-y-4">
                <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                    <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-3 flex justify-between items-center">
                        <span class="text-white text-xs font-bold uppercase tracking-widest">AI Response</span>
                        <span id="searchTime" class="text-indigo-100 text-xs"></span>
                    </div>
                    <div class="p-8">
                        <div id="aiAnswerBody" class="text-gray-800 leading-relaxed text-lg prose max-w-none">
                            </div>
                    </div>
                </div>

                <div id="sourcesContainer" class="space-y-3">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-2">Sources Found</h3>
                    <div id="sourcesList" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        </div>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-8">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-200">
                <h2 id="formTitle" class="text-2xl font-bold mb-6">Database Management</h2>
                <input type="hidden" id="adminBookId">
                <div class="space-y-4">
                    <input type="text" id="adminTitle" placeholder="Title" class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <textarea id="adminBookText" rows="6" placeholder="Full Plot Text" class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    <div class="flex space-x-3">
                        <button onclick="saveBook()" class="bg-green-600 text-white font-bold py-3 px-8 rounded-xl">Save Entry</button>
                        <button onclick="resetAdminForm()" id="cancelEditBtn" class="hidden bg-gray-100 text-gray-600 font-bold py-3 px-8 rounded-xl">Cancel</button>
                        <button onclick="deleteBook()" id="deleteBtn" class="hidden bg-red-500 text-white font-bold py-3 px-8 rounded-xl ml-auto">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function switchTab(tab) {
            document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
            document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tab-search').className = tab === 'search' ? "py-4 px-2 border-b-2 border-indigo-600 font-bold text-indigo-600" : "py-4 px-2 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-800";
            document.getElementById('tab-admin').className = tab === 'admin' ? "py-4 px-2 border-b-2 border-indigo-600 font-bold text-indigo-600" : "py-4 px-2 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-800";
        }

        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const loader = document.getElementById('searchLoader');
            const answerSection = document.getElementById('aiAnswerSection');
            
            answerSection.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: 5 })
                });

                const data = await response.json();
                renderAIResponse(data);
            } catch (error) {
                alert("Connection lost. Ensure the API is running.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderAIResponse(data) {
            const answerBody = document.getElementById('aiAnswerBody');
            const sourcesList = document.getElementById('sourcesList');
            const timeSpan = document.getElementById('searchTime');

            // 1. Update Header Timing
            timeSpan.innerText = `Computed in ${data.execution_time}s`;

            // 2. Inject AI Answer (handles multi-line responses)
            answerBody.innerHTML = data.answer.replace(/\n/g, '<br>');

            // 3. Inject Sources (The snippets/titles)
            sourcesList.innerHTML = '';
            data.search_plan.results_used?.forEach((res, index) => {
                // We show small source cards below the answer
                const card = document.createElement('div');
                card.className = "p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-indigo-300 transition-all cursor-pointer";
                card.innerHTML = `
                    <p class="text-xs font-bold text-indigo-600 mb-1">Source ${index + 1}</p>
                    <h4 class="font-bold text-sm text-gray-800 truncate">${res.title}</h4>
                `;
                // If user clicks a source, we could scroll them to a full plot view
                sourcesList.appendChild(card);
            });

            document.getElementById('aiAnswerSection').classList.remove('hidden');
        }

        // --- Standard Admin Functions (CRUD) remain mostly same ---
        async function saveBook() { /* logic from previous turn */ }
        function resetAdminForm() { /* logic from previous turn */ }
    </script>
</body>
</html>
