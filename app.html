<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikiplot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Spinner for loading states */
        .spinner { border-top-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Smooth entry animation for results */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scrollbar styling for long plots */
        .plot-scroll::-webkit-scrollbar { width: 4px; }
        .plot-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .plot-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* Removing default summary markers for a cleaner look */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        /* Highlight effect when clicking a citation */
        .highlight-card { 
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.4);
            transform: scale(1.01);
            border-color: #818cf8;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 flex space-x-6">
            <button onclick="switchTab('search')" id="tab-search" class="py-4 border-b-2 border-indigo-600 font-bold text-indigo-600 transition-all">AI Search</button>
            <button onclick="switchTab('admin')" id="tab-admin" class="py-4 border-b-2 border-transparent text-gray-500 hover:text-indigo-600 transition-all">Manage Data</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-10">
        
        <div id="view-search" class="space-y-6">
            <div class="relative">
                <input type="text" id="searchInput" 
                    class="w-full text-xl p-6 pr-36 rounded-2xl border-2 border-gray-100 shadow-xl focus:border-indigo-500 outline-none transition-all" 
                    placeholder="Ask about plots, characters, or relationships..."
                    onkeypress="if(event.key === 'Enter') executeSearch()">
                <button onclick="executeSearch()" class="absolute right-3 top-3 bg-indigo-600 text-white font-bold px-8 py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition-all">
                    Ask
                </button>
            </div>

            <div id="searchLoader" class="hidden flex flex-col items-center py-20">
                <div class="spinner rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-indigo-600 font-medium animate-pulse">Consulting the archives...</p>
            </div>

            <div id="resultArea" class="hidden fade-in space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                        <p class="text-[10px] uppercase font-bold text-indigo-400 mb-1 tracking-widest">Original Query</p>
                        <p id="originalQueryDisplay" class="text-sm font-medium text-indigo-900 italic"></p>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-xl border border-purple-100">
                        <p class="text-[10px] uppercase font-bold text-purple-400 mb-1 tracking-widest">Optimized Keywords</p>
                        <p id="searchQueryDisplay" class="text-sm font-medium text-purple-900 font-mono"></p>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 px-6 py-3 border-b border-gray-100 flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">AI Synthesis</span>
                        <span id="execTime" class="text-xs text-indigo-500 font-bold bg-indigo-50 px-2 py-1 rounded"></span>
                    </div>
                    <div id="answerText" class="p-8 text-lg leading-relaxed text-gray-800 whitespace-pre-wrap">
                        </div>
                </div>

                <div id="sourceSection" class="space-y-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-2">Cited References</h3>
                    <div id="sourceList" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-8">
            <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm">
                <h2 id="formTitle" class="text-xl font-bold mb-6">Create New Entry</h2>
                <input type="hidden" id="adminBookId">
                <div class="space-y-4">
                    <input type="text" id="adminTitle" placeholder="Title (Movie, Book, etc.)" class="w-full p-4 rounded-xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500">
                    <textarea id="adminBookText" rows="6" placeholder="Full Plot Description" class="w-full p-4 rounded-xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    <div class="flex space-x-3">
                        <button onclick="saveBook()" class="bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-indigo-700 transition-all">Save</button>
                        <button onclick="resetAdminForm()" id="cancelEditBtn" class="hidden bg-gray-100 text-gray-500 font-bold py-3 px-8 rounded-xl">Cancel</button>
                        <button onclick="deleteBook()" id="deleteBtn" class="hidden bg-red-50 text-red-600 font-bold py-3 px-8 rounded-xl ml-auto">Delete</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-sm">
                <h2 class="text-lg font-bold mb-4">Database Search</h2>
                <div class="flex space-x-3 mb-6">
                    <input type="text" id="adminSearchInput" class="w-full p-4 rounded-xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Search title to edit...">
                    <button onclick="executeAdminSearch()" class="bg-gray-800 text-white font-bold px-6 py-4 rounded-xl">Find</button>
                </div>
                <div id="adminLoader" class="hidden flex justify-center py-6">
                    <div class="spinner rounded-full border-4 border-t-4 border-gray-200 h-8 w-8"></div>
                </div>
                <div id="adminSearchResults" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = window.location.origin;

        function switchTab(tab) {
            document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
            document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tab-search').className = tab === 'search' ? "py-4 border-b-2 border-indigo-600 font-bold text-indigo-600" : "py-4 border-b-2 border-transparent text-gray-500 hover:text-indigo-600";
            document.getElementById('tab-admin').className = tab === 'admin' ? "py-4 border-b-2 border-indigo-600 font-bold text-indigo-600" : "py-4 border-b-2 border-transparent text-gray-500 hover:text-indigo-600";
        }

        async function executeSearch() {
            const queryInput = document.getElementById('searchInput');
            const query = queryInput.value.trim();
            if (!query) return;

            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('searchLoader').classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: 5 })
                });

                const data = await response.json();
                renderResults(data);
            } catch (err) {
                alert("Search request failed. Ensure the server is online.");
            } finally {
                document.getElementById('searchLoader').classList.add('hidden');
            }
        }

        function renderResults(data) {
            const answerBody = document.getElementById('answerText');
            document.getElementById('execTime').innerText = `${data.execution_time_seconds}s`;
            document.getElementById('originalQueryDisplay').innerText = data.user_query;
            document.getElementById('searchQueryDisplay').innerText = data.search_query;

            // Linkification: Converts "[Source 1, 2]" into clickable links
            const rawAnswer = data.answer || "No synthesis available.";
            let linkedAnswer = rawAnswer.replace(/\[Source (\d+(?:,\s*\d+)*)\]/g, (match, p1) => {
                const numbers = p1.split(',').map(n => n.trim());
                const links = numbers.map(num => 
                    `<a href="#source-card-${num}" onclick="highlightSource(${num})" class="text-indigo-600 font-bold hover:underline cursor-pointer">[${num}]</a>`
                ).join(', ');
                return `<span>${links}</span>`;
            });
            answerBody.innerHTML = linkedAnswer;

            const list = document.getElementById('sourceList');
            list.innerHTML = '';

            if (data.results && data.results.length > 0) {
                data.results.forEach((item, i) => {
                    const num = i + 1;
                    const section = document.createElement('div');
                    section.id = `source-card-${num}`;
                    section.className = "bg-white rounded-2xl border border-gray-200 overflow-hidden transition-all duration-500";
                    section.innerHTML = `
                        <details class="group">
                            <summary class="p-6 cursor-pointer flex justify-between items-center hover:bg-gray-50 transition-colors">
                                <div class="flex items-center space-x-4">
                                    <span class="bg-indigo-100 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Source ${num}</span>
                                    <h4 class="font-bold text-gray-800">${item.title}</h4>
                                </div>
                                <span class="text-indigo-400 group-open:rotate-180 transition-transform">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </span>
                            </summary>
                            <div class="px-8 pb-8 pt-2">
                                <div class="max-h-[400px] overflow-y-auto plot-scroll pr-4 text-gray-600 leading-relaxed whitespace-pre-line text-sm border-t border-gray-100 pt-6">
${item.full_plot_text.trim()}</div>
                            </div>
                        </details>
                    `;
                    list.appendChild(section);
                });
            } else {
                list.innerHTML = '<p class="text-gray-400 italic ml-2">No relevant sources found.</p>';
            }

            document.getElementById('resultArea').classList.remove('hidden');
        }

        function highlightSource(num) {
            const card = document.getElementById(`source-card-${num}`);
            if (card) {
                const details = card.querySelector('details');
                if (details) details.open = true;

                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.classList.add('highlight-card');
                setTimeout(() => card.classList.remove('highlight-card'), 2500);
            }
        }

        // --- ADMIN / CRUD LOGIC ---

        async function executeAdminSearch() {
            const query = document.getElementById('adminSearchInput').value.trim();
            const resultsContainer = document.getElementById('adminSearchResults');
            const loader = document.getElementById('adminLoader');
            
            resultsContainer.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/books/search?title=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.length === 0) {
                    resultsContainer.innerHTML = '<p class="text-gray-500 text-sm p-4">No entries found.</p>';
                }

                data.forEach(book => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 bg-gray-50 hover:bg-indigo-50 rounded-xl border border-gray-100 transition-colors flex justify-between items-center mb-2";
                    btn.innerHTML = `<span class="font-bold text-gray-700">${book.title}</span><span class="text-xs text-indigo-400 uppercase font-bold">Edit</span>`;
                    btn.onclick = () => loadBookIntoForm(book.id, book.title, book.plot);
                    resultsContainer.appendChild(btn);
                });
            } catch (err) {
                alert("Database lookup failed.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function loadBookIntoForm(id, title, plot) {
            document.getElementById('adminBookId').value = id;
            document.getElementById('adminTitle').value = title;
            document.getElementById('adminBookText').value = plot;
            document.getElementById('formTitle').innerText = `Editing: ${title}`;
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('deleteBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetAdminForm() {
            document.getElementById('adminBookId').value = '';
            document.getElementById('adminTitle').value = '';
            document.getElementById('adminBookText').value = '';
            document.getElementById('formTitle').innerText = "Create New Entry";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('deleteBtn').classList.add('hidden');
        }

        async function saveBook() {
            const id = document.getElementById('adminBookId').value;
            const title = document.getElementById('adminTitle').value;
            const plot = document.getElementById('adminBookText').value;

            if (!title || !plot) return alert("Title and Plot are required.");

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/books/${id}` : `${API_URL}/books`;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, plot: plot })
                });

                if (response.ok) {
                    alert(id ? "Entry updated!" : "New entry created!");
                    resetAdminForm();
                    document.getElementById('adminSearchResults').innerHTML = '';
                }
            } catch (err) {
                alert("Error saving to database.");
            }
        }

        async function deleteBook() {
            const id = document.getElementById('adminBookId').value;
            if (!id || !confirm("Permanently delete this entry?")) return;

            try {
                const response = await fetch(`${API_URL}/books/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert("Deleted successfully.");
                    resetAdminForm();
                    document.getElementById('adminSearchResults').innerHTML = '';
                }
            } catch (err) {
                alert("Error deleting from database.");
            }
        }
    </script>
</body>
</html>
