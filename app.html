<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikiplot System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        details > summary { list-style: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: sweep .3s ease-in-out; }
        @keyframes sweep {
            0%    {opacity: 0; transform: translateY(-10px)}
            100%  {opacity: 1; transform: translateY(0)}
        }

        .spinner {
            border-top-color: #4f46e5;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 flex space-x-8">
            <button onclick="switchTab('search')" id="tab-search" class="py-4 px-2 border-b-2 border-indigo-600 font-bold text-indigo-600 transition-colors">Search</button>
            <button onclick="switchTab('admin')" id="tab-admin" class="py-4 px-2 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-800 transition-colors">CRUD</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 py-8">

        <div id="view-search" class="block">
            <div class="mb-8">
                <input type="text" id="searchInput" class="w-full text-lg pl-6 pr-32 py-4 rounded-xl border-2 border-gray-200 focus:border-indigo-500 focus:outline-none shadow-sm" placeholder="Describe a book..." onkeypress="if(event.key === 'Enter') executeSearch()">
                <button onclick="executeSearch()" class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">Search</button>
            </div>

            <div id="searchLoader" class="hidden flex flex-col items-center justify-center py-12">
                <div class="spinner ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
                <p class="text-gray-500 font-bold tracking-wide animate-pulse">Running Vector Math...</p>
            </div>

            <div id="bestMatchContainer" class="hidden mb-8">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">Top Match</h3>
                <div class="bg-white rounded-2xl shadow-lg border border-indigo-100 overflow-hidden">
                    <div class="bg-indigo-600 px-6 py-4">
                        <h2 id="bestMatchTitle" class="text-2xl font-bold text-white">Title Here</h2>
                    </div>
                    <div class="p-6">
                        <p id="bestMatchPlot" class="text-gray-700 leading-relaxed text-lg whitespace-pre-wrap">Plot goes here...</p>
                    </div>
                </div>
            </div>

            <div id="similarBooksContainer" class="hidden">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Similar Books</h3>
                <div id="runnersUpList" class="space-y-4">
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 id="formTitle" class="text-2xl font-bold mb-6 text-gray-800">Create New Book</h2>
                <input type="hidden" id="adminBookId">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Title</label>
                        <input type="text" id="adminTitle" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Full Plot</label>
                        <textarea id="adminBookText" rows="6" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>
                    </div>
                    <div class="flex space-x-3 pt-2">
                        <button onclick="saveBook()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">Save Book</button>
                        <button onclick="resetAdminForm()" id="cancelEditBtn" class="hidden bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-6 rounded-lg transition-colors">Cancel Edit</button>
                        <button onclick="deleteBook()" id="deleteBtn" class="hidden bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition-colors ml-auto">Delete</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4 text-gray-800">Search to Edit or Delete</h2>
                <div class="flex space-x-3 mb-4">
                    <input type="text" id="adminSearchInput" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Search by title or concept...">
                    <button onclick="executeAdminSearch()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-6 rounded-lg transition-colors">Search</button>
                </div>
                
                <div id="adminLoader" class="hidden flex justify-center py-6">
                    <div class="spinner ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8"></div>
                </div>

                <div id="adminSearchResults" class="space-y-2">
                </div>
            </div>

        </div>

    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';

        function switchTab(tab) {
            document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
            document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
            
            if (tab === 'search') {
                document.getElementById('tab-search').className = "py-4 px-2 border-b-2 border-indigo-600 font-bold text-indigo-600 transition-colors";
                document.getElementById('tab-admin').className = "py-4 px-2 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-800 transition-colors";
            } else {
                document.getElementById('tab-admin').className = "py-4 px-2 border-b-2 border-indigo-600 font-bold text-indigo-600 transition-colors";
                document.getElementById('tab-search').className = "py-4 px-2 border-b-2 border-transparent font-medium text-gray-500 hover:text-gray-800 transition-colors";
            }
        }

        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            document.getElementById('bestMatchContainer').classList.add('hidden');
            document.getElementById('similarBooksContainer').classList.add('hidden');
            document.getElementById('searchLoader').classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: 5 })
                });
                
                const data = await response.json();
                renderSearchResults(data.results);
            } catch (error) {
                alert("Search failed. Ensure Uvicorn is running.");
            } finally {
                document.getElementById('searchLoader').classList.add('hidden');
            }
        }

        function renderSearchResults(results) {
            if (results.length === 0) return;

            const winner = results[0];
            document.getElementById('bestMatchTitle').innerText = winner.title;
            document.getElementById('bestMatchPlot').innerText = winner.full_plot_text;
            document.getElementById('bestMatchContainer').classList.remove('hidden');

            const runnersList = document.getElementById('runnersUpList');
            runnersList.innerHTML = ''; 
            
            const runners = results.slice(1);
            runners.forEach(book => {
                const html = `
                    <details class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden group">
                        <summary class="px-6 py-4 font-bold text-lg text-gray-800 bg-gray-50 hover:bg-gray-100 flex justify-between items-center outline-none">
                            ${book.title}
                            <span class="text-sm font-normal text-indigo-600 group-open:hidden">Read Plot</span>
                            <span class="text-sm font-normal text-indigo-600 hidden group-open:inline">Collapse</span>
                        </summary>
                        <div class="px-6 py-4 border-t border-gray-100 text-gray-700 whitespace-pre-wrap leading-relaxed">${book.full_plot_text}</div>
                    </details>
                `;
                runnersList.innerHTML += html;
            });
            
            document.getElementById('similarBooksContainer').classList.remove('hidden');
        }

        async function executeAdminSearch() {
            const query = document.getElementById('adminSearchInput').value.trim();
            if (!query) return;

            const resultsContainer = document.getElementById('adminSearchResults');
            const loader = document.getElementById('adminLoader');

            resultsContainer.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/books/search?title=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.length === 0) {
                    resultsContainer.innerHTML = '<p class="text-gray-500 text-sm">No exact titles found.</p>';
                    return;
                }

                data.forEach(result => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 bg-gray-50 hover:bg-indigo-50 rounded-lg border border-gray-200 transition-colors flex justify-between items-center mb-2";
                    btn.innerHTML = `<span class="font-bold">${result.title}</span> <span class="text-xs text-gray-400">ID: ${result.id.substring(0,8)}...</span>`;
                    btn.onclick = () => loadBookIntoForm(result.id, result.title, result.plot);
                    resultsContainer.appendChild(btn);
                });
            } catch (error) {
                resultsContainer.innerHTML = '<p class="text-red-500">Database search failed.</p>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        function loadBookIntoForm(id, title, plot) {
            document.getElementById('adminBookId').value = id;
            document.getElementById('adminTitle').value = title;
            document.getElementById('adminBookText').value = plot;
            
            document.getElementById('formTitle').innerText = `Editing: ${title}`;
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('deleteBtn').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetAdminForm() {
            document.getElementById('adminBookId').value = '';
            document.getElementById('adminTitle').value = '';
            document.getElementById('adminBookText').value = '';
            
            document.getElementById('formTitle').innerText = "Create New Book";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('deleteBtn').classList.add('hidden');
        }

        async function saveBook() {
            const id = document.getElementById('adminBookId').value;
            const title = document.getElementById('adminTitle').value;
            const plot = document.getElementById('adminBookText').value;

            if (!title || !plot) return alert("Title and Plot are required.");

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/books/${id}` : `${API_URL}/books`;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, plot: plot })
                });

                if (response.ok) {
                    alert(id ? "Book updated successfully!" : "Book created successfully!");
                    resetAdminForm();
                } else {
                    alert("Failed to save book.");
                }
            } catch (error) {
                alert("Error connecting to server.");
            }
        }

        async function deleteBook() {
            const id = document.getElementById('adminBookId').value;
            if (!id) return;

            if (!confirm("Are you sure you want to permanently delete this book?")) return;

            try {
                const response = await fetch(`${API_URL}/books/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert("Book deleted successfully.");
                    resetAdminForm();
                    document.getElementById('adminSearchResults').innerHTML = '';
                } else {
                    alert("Failed to delete.");
                }
            } catch (error) {
                alert("Error connecting to server.");
            }
        }
    </script>
</body>
</html>
